# YOLOPx Original Training Configuration
# Purpose: Standard training without conflict detection (based on 200 epoch experiment settings)
# This config matches the regular_test/yolopx_base.yaml settings but with 5 epochs

# Project Configuration
PROJECT_NAME: 'yolopx_original'
EXPERIMENT_SUFFIX: 'reproduction'

# Training Configuration
TRAIN:
  # Training epochs
  END_EPOCH: 1
  VAL_FREQ: 2                      # Validate every 2 epochs (same as original)
  BEGIN_EPOCH: 0

  # Batch settings (same as original 200 epoch experiment)
  BATCH_SIZE_PER_GPU: 32           # Same as original
  SAMPLE: -1                       # Use all training samples
  SHUFFLE: True                    # Enable shuffling

  # Optimizer settings (same as original)
  OPTIMIZER: 'adamw'
  LR0: 0.001
  LRF: 0.01
  MOMENTUM: 0.937
  WD: 0.05
  NESTEROV: False
  GAMMA1: 0.9
  GAMMA2: 0.999

  # Warmup settings (same as original)
  WARMUP_EPOCHS: 1
  WARMUP_BIASE_LR: 0.0001
  WARMUP_MOMENTUM: 0.8

  # Loss thresholds
  IOU_THRESHOLD: 0.2
  ANCHOR_THRESHOLD: 4.0

  # Task selection - train all tasks (same as original)
  SEG_ONLY: False
  DET_ONLY: False
  ENC_SEG_ONLY: False
  ENC_DET_ONLY: False
  DRIVABLE_ONLY: False
  LANE_ONLY: False

  # Visualization and logging
  PLOTS: True                      # Enable standard plots
  PRINT_FREQ: 10                   # Print every 10 steps (same as original)

  # === CONFLICT DETECTION DISABLED ===
  COMPUTE_CONFLICT_METRICS: False  # Disable conflict metrics computation

  # Model saving
  SAVE_BEST: True
  BEST_METRIC: 'total_loss'

  # MTL Strategy - None (original baseline)
  MTL_STRATEGY: 'None'

# Validation Configuration
VAL:
  BATCH_SIZE_PER_GPU: 32           # Same as original
  SAMPLE: -1                       # Use all validation samples

  # Model and output
  MODEL_FILE: ''
  SAVE_JSON: False
  SAVE_TXT: False
  PLOTS: True                      # Enable validation plots

  # NMS settings
  NMS_CONF_THRESHOLD: 0.001
  NMS_IOU_THRESHOLD: 0.65

  # Feature visualization
  VISUALIZE_FEATURES: True
  VISUALIZE_IN_VAL: True
  VISUALIZE_TASK_ADAPTIVE: True

# GPU Configuration
GPUS: [0]                          # Use GPU 0

# General Configuration
LOG_DIR: 'runs/'
WORKERS: 8                         # Data loading workers
PIN_MEMORY: True                   # Enable for GPU training
AUTO_RESUME: True                  # Enable auto resume
PRETRAINED: ''
NEED_AUTOANCHOR: False
PRINT_FREQ: 10                     # Print frequency

# Debug mode disabled
DEBUG: False
num_seg_class: 2

# Data augmentation (same as original)
mosaic_rate: 0.5
mixup_rate: 0.5

# CUDNN Configuration - Performance mode
CUDNN:
  BENCHMARK: True                  # Enable for performance
  DETERMINISTIC: False             # Disable for speed
  ENABLED: True

# Weights & Biases
WANDB:
  ENABLED: True
  PROJECT: 'yolopx_original'
  ONLINE: True

# Model Configuration
MODEL_CFG:
  PATH: 'lib/config/model/yolopx.yaml'

# Data Configuration
DATA_CFG:
  PATH: 'lib/config/data/bdd100k.yaml'
