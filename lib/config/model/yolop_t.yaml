# YOLOP-T (YOLOP-Taxonomy) Model Configuration
# Task-aware architecture with decoupled necks for detection and segmentation
# Based on YOLOPX backbone with separated task-specific necks

# Model output indices
# [det_out_idx, da_seg_out_idx, ll_seg_out_idx]
output_indices: [27, 63, 67]

# Network architecture definition (list format like YOLOPX)
YOLOP_T: [
  # Output indices: [Detection_head_idx, DA_seg_idx, LL_seg_idx]
  [27, 63, 67],
  
  ##### Backbone (from YOLOPX) #####
  # ELANNet backbone that outputs C2, C3, C4, C5 features
  [-1, 'ELANNet', [True]],  # 0 - Outputs multiple feature levels
  
  ##### Feature Extraction for Dual Necks #####
  # Get C2 feature (index 3 from backbone)
  [0, 'FPN_C2', []],  # 1 - Extract C2 (256 channels)
  
  # Get C3 feature (index 6 from backbone) 
  [0, 'FPN_C3', []],  # 2 - Extract C3 (256 channels)
  
  # Get C4 feature (index 8 from backbone)
  [0, 'FPN_C4', []],  # 3 - Extract C4 (512 channels)
  
  # Get C5 feature (index 10 from backbone)
  [0, 'FPN_C5', []],  # 4 - Extract C5 (1024 channels)
  
  ##### Detection Neck (PaFPN for C3, C4, C5) #####
  # Top-down path (FPN)
  [4, 'Conv', [1024, 512, 1, 1]],  # 5
  [-1, 'Upsample', [None, 2, 'nearest']],  # 6
  [[-1, 3], 'Concat', [1]],  # 7 - Concat with C4
  [-1, 'BottleneckCSP', [1024, 512, 1, False]],  # 8 - P4
  
  [-1, 'Conv', [512, 256, 1, 1]],  # 9
  [-1, 'Upsample', [None, 2, 'nearest']],  # 10
  [[-1, 2], 'Concat', [1]],  # 11 - Concat with C3
  [-1, 'BottleneckCSP', [512, 256, 1, False]],  # 12 - P3
  
  # Bottom-up path (PAN)
  [-1, 'Conv', [256, 256, 3, 2]],  # 13
  [[-1, 9], 'Concat', [1]],  # 14
  [-1, 'BottleneckCSP', [512, 512, 1, False]],  # 15 - N4
  
  [-1, 'Conv', [512, 512, 3, 2]],  # 16
  [[-1, 5], 'Concat', [1]],  # 17
  [-1, 'BottleneckCSP', [1024, 1024, 1, False]],  # 18 - N5
  
  # Detection outputs [P3, N4, N5]
  [[12, 15, 18], 'YOLOXHead', [1]],  # 27 - Detection head
  
  ##### Segmentation Neck (Lightweight for C2, C3) #####
  # Merge C2 and C3 with high resolution
  [2, 'Conv', [256, 128, 1, 1]],  # 28
  [-1, 'Upsample', [None, 2, 'nearest']],  # 29
  [[-1, 1], 'Concat', [1]],  # 30 - Concat with C2
  [-1, 'BottleneckCSP', [384, 256, 1, False]],  # 31
  
  # Progressive upsampling to original resolution
  [-1, 'Conv', [256, 128, 3, 1]],  # 32
  [-1, 'Upsample', [None, 2, 'nearest']],  # 33
  [-1, 'Conv', [128, 64, 3, 1]],  # 34
  [-1, 'Upsample', [None, 2, 'nearest']],  # 35
  
  ##### Segmentation Heads (Separate for DA and LL) #####
  # Drivable Area Head
  [35, 'Conv', [64, 32, 3, 1]],  # 36
  [-1, 'Upsample', [None, 2, 'nearest']],  # 37
  [-1, 'Conv', [32, 16, 3, 1]],  # 38
  [-1, 'Upsample', [None, 2, 'nearest']],  # 39
  [-1, 'Conv', [16, 2, 1, 1]],  # 40
  [-1, 'seg_head', ['sigmoid']],  # 63 - DA segmentation output
  
  # Lane Line Head (with PSA attention)
  [35, 'Conv', [64, 32, 3, 1]],  # 42
  [-1, 'PSA_p', [32, 32]],  # 43 - Attention for lane lines
  [-1, 'Upsample', [None, 2, 'nearest']],  # 44
  [-1, 'Conv', [32, 16, 3, 1]],  # 45
  [-1, 'PSA_p', [16, 16]],  # 46 - Attention for lane lines
  [-1, 'Upsample', [None, 2, 'nearest']],  # 47
  [-1, 'Conv', [16, 2, 1, 1]],  # 48
  [-1, 'seg_head', ['sigmoid']],  # 67 - LL segmentation output
]

# Model metadata
NAME: 'YOLOP_T'
TYPE: 'yolop_t'
nc: 1  # Number of detection classes
IMAGE_SIZE: [640, 640]

# Loss weights
LOSS:
  MULTI_HEAD_LAMBDA: [1.0, 0.2, 0.2]  # [detection, drivable_area, lane_line]
  
  # Detection loss
  CLS_GAIN: 0.5
  OBJ_GAIN: 1.0
  BOX_GAIN: 0.05
  
  # Segmentation loss
  DA_SEG_GAIN: 0.2
  LL_SEG_GAIN: 0.2
  LL_IOU_GAIN: 0.2